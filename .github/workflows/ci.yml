# GitHub Actions CI for the Jamboree monorepo.
#
# Per spec §11.2.8 (CI matrix). Mirrors the pre-commit hooks plus a few
# heavier jobs (cargo audit, gitleaks scan) that aren't worth running on
# every commit but should gate every PR.
#
# Matrix is intentionally narrow at Phase 0 — Python (ruff/pyright/pytest/
# pip-audit/bandit), cargo deny, and live-llm tests land when their owning
# crates exist.

name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs for the same ref/PR when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # NOT -D warnings: pedantic lints (`clippy::pedantic = warn` in workspace
  # Cargo.toml) should advise without blocking. `clippy::all` is already
  # `deny` at the workspace level — actual bugs still fail the build.
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy --workspace --all-targets
        # `clippy::all = deny` at the workspace level still fails the build on
        # genuine bug-class lints. Pedantic suggestions print but don't block.
        run: cargo clippy --workspace --all-targets

      - name: cargo test --workspace --locked
        run: cargo test --workspace --locked

  events-codegen:
    name: events-codegen --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify events.toml is in sync with generated files
        run: python3 tools/events-codegen.py --check

  coderabbit-yaml:
    name: coderabbit yaml schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip when .coderabbit.yaml absent
        id: present
        run: |
          if [[ -f .coderabbit.yaml ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.present.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validator deps
        if: steps.present.outputs.exists == 'true'
        run: pip install --quiet pyyaml jsonschema requests

      # Validate .coderabbit.yaml against the published CodeRabbit JSON
      # schema. Catches the failure mode where a picker edits the config and
      # introduces a regression (CodeRabbit silently falls back to defaults
      # then, which effectively turns off review on the next PR).
      - name: Validate against CodeRabbit schema
        if: steps.present.outputs.exists == 'true'
        run: |
          python3 - <<'PY'
          import json, sys, yaml, requests
          import jsonschema
          schema = requests.get(
              "https://coderabbit.ai/integrations/schema.v2.json",
              timeout=30,
          ).json()
          with open(".coderabbit.yaml") as f:
              cfg = yaml.safe_load(f)
          try:
              jsonschema.validate(cfg, schema)
              print(".coderabbit.yaml validates against schema.v2")
          except jsonschema.ValidationError as e:
              print(f"ERROR: .coderabbit.yaml does not match schema.v2:\n  path: {'/'.join(map(str, e.absolute_path))}\n  msg:  {e.message}", file=sys.stderr)
              sys.exit(1)
          PY

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        # See audit.toml at the workspace root for the rationale on each
        # ignored advisory. cargo-audit only auto-reads `~/.cargo/audit.toml`,
        # not a workspace-root config, so the ignore list is duplicated here.
        # Re-evaluate when bumping `async-nats` (releases the rustls-webpki
        # pins) or when `rsa` ships a Marvin-Attack fix.
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104

  gitleaks:
    name: gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
