    { name = "trunk_ref",                type = "string",   required = true },
    { name = "trunk_sha",                type = "string",   required = true },
    { name = "fetched",                  type = "bool",     required = true },
    { name = "branched_at",              type = "datetime", required = true },
    { name = "fetch_cursor_at_create",   type = "datetime", required = true },
]


