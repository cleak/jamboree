    { name = "merged_at",   type = "datetime", required = true },
    { name = "touched_paths", type = "string", required = false },  # JSON array as string for now; codegen may upgrade to Vec<path>
]


# ─── Maestro events ────────────────────────────────────────────────────

[events."maestro.session-started"]
version = 1
description = "Maestro wake handler opened a new session."
fields = [
    { name = "session_id",   type = "string",   required = true },
    { name = "wake_source",  type = "string",   required = true },  # "bus-event" | "user-input" | "tick" | "stall-escalation"
    { name = "wake_subject", type = "string",   required = false },
    { name = "started_at",   type = "datetime", required = true },
]

[events."maestro.session-ended"]
version = 1
description = "Maestro session closed (done | budget-exceeded | interrupted | fatal)."
fields = [
    { name = "session_id",       type = "string",      required = true  },
    { name = "outcome",          type = "string",      required = true  },  # "done" | "budget-soft" | "budget-hard" | "interrupted" | "fatal"
    { name = "duration_ms",      type = "duration_ms", required = true  },
    { name = "input_tokens",     type = "u64",         required = true  },
    { name = "output_tokens",    type = "u64",         required = true  },
    { name = "cost_usd",         type = "f64",         required = true  },
    { name = "tool_calls_count", type = "u32",         required = true  },
    { name = "ended_at",         type = "datetime",    required = true  },
]

[events."maestro.tool-call"]
version = 1
description = "Maestro invoked a tool service via NATS request-reply (every call is journaled)."
fields = [
    { name = "session_id",  type = "string",      required = true },
    { name = "tool_name",   type = "string",      required = true },
    { name = "duration_ms", type = "duration_ms", required = true },
    { name = "success",     type = "bool",        required = true },
    { name = "error_kind",  type = "string",      required = false },
    { name = "ts",          type = "datetime",    required = true },
]

[events."maestro.budget.soft-exceeded"]
version = 1
description = "Per-session budget hit 100% — Maestro finishes current turn, aborts next unless extended (§4.1.4)."
fields = [
    { name = "session_id", type = "string",   required = true },
    { name = "spent_usd",  type = "f64",      required = true },
    { name = "budget_usd", type = "f64",      required = true },
    { name = "ts",         type = "datetime", required = true },
]

[events."maestro.budget.hard-exceeded"]
version = 1
description = "Per-session budget hit 125% — hard-abort, dump partial state, ntfy human."
fields = [
    { name = "session_id",  type = "string",   required = true },
    { name = "spent_usd",   type = "f64",      required = true },
    { name = "budget_usd",  type = "f64",      required = true },
    { name = "dump_path",   type = "path",     required = true },
    { name = "ts",          type = "datetime", required = true },
]

[events."maestro.budget.daily-exceeded"]
version = 1
description = "Daily budget 100% — auto-pause-dispatch, ntfy urgently."
fields = [
    { name = "spent_usd",  type = "f64",      required = true },
    { name = "budget_usd", type = "f64",      required = true },
    { name = "ts",         type = "datetime", required = true },
]


# ─── Quota events ──────────────────────────────────────────────────────

[events."quota.exhausted"]
version = 1
description = "A harness's window is exhausted (Codex 5h window full, Claude rate-limit hit, API budget cap)."
fields = [
    { name = "harness",      type = "string",   required = true },
    { name = "window_kind",  type = "string",   required = true },  # "local-messages" | "cloud-tasks" | "code-reviews" | "rate-limit" | "api-budget"
    { name = "resets_at",    type = "datetime", required = false }, # null for API budget without reset
    { name = "detected_at",  type = "datetime", required = true },
]

[events."quota.exhausted-soon"]
version = 1
description = "Predictive: within 10% of exhaustion — Maestro can pre-emptively reroute."
fields = [
    { name = "harness",     type = "string",   required = true },
    { name = "window_kind", type = "string",   required = true },
    { name = "remaining",   type = "f64",      required = true },  # fraction 0.0-1.0
    { name = "ts",          type = "datetime", required = true },
]

[events."quota.refilled"]
version = 1
description = "5h window reset / API budget topped up / rate-limit cleared."
fields = [
    { name = "harness",     type = "string",   required = true },
    { name = "window_kind", type = "string",   required = true },
    { name = "ts",          type = "datetime", required = true },
]

[events."quota.usage-observed"]
version = 1
description = "Process-side harness usage parsed from harness JSON logs or response metadata."
fields = [
    { name = "harness",       type = "string",   required = true },
    { name = "window_kind",   type = "string",   required = true },
    { name = "session_id",    type = "string",   required = true },
    { name = "task_id",       type = "string",   required = true },
    { name = "provider",      type = "string",   required = false },
    { name = "model",         type = "string",   required = false },
    { name = "input_tokens",  type = "u64",      required = false },
    { name = "output_tokens", type = "u64",      required = false },
    { name = "cost_usd",      type = "f64",      required = false },
    { name = "source",        type = "string",   required = true },
    { name = "observed_at",   type = "datetime", required = true },
]


