# ─── Skill evolution events ────────────────────────────────────────────

[events."evolve.skill-promoted"]
version = 1
description = "Human accepted a skill evolution candidate via git commit."
fields = [
    { name = "skill_path", type = "path",     required = true },
    { name = "ts",         type = "datetime", required = true },
]

[events."evolve.skill-rejected"]
version = 1
description = "Human rejected a skill evolution candidate."
fields = [
    { name = "skill_path",     type = "path",     required = true },
    { name = "candidate_path", type = "path",     required = true },
    { name = "ts",             type = "datetime", required = true },
]

[events."evolve.skill-under-suspicion"]
version = 1
description = "skill-suspicion-reconciler observed >=3 dead_end entries in 7d for a skill (§7.4)."
fields = [
    { name = "skill_scope",        type = "string",   required = true },
    { name = "dead_end_count",     type = "u32",      required = true },
    { name = "since_days",         type = "u32",      required = true },
    { name = "implicating_traces", type = "string",   required = false },  # JSON array stringified
    { name = "ts",                 type = "datetime", required = true },
]


# ─── Substrate health / reconciler events ──────────────────────────────

[events."branch.trunk-moved"]
version = 1
description = "trunk-fetcher observed origin/<trunk> moved (§4.4.6)."
fields = [
    { name = "project",    type = "string",   required = true },
    { name = "old_sha",    type = "string",   required = true },
    { name = "new_sha",    type = "string",   required = true },
    { name = "fetched_at", type = "datetime", required = true },
]

[events."branch.staleness-updated"]
version = 1
description = "trunk-fetcher recomputed per-worktree staleness."
fields = [
    { name = "task_id",        type = "string",   required = true },
    { name = "commits_behind", type = "u32",      required = true },
    { name = "commits_ahead",  type = "u32",      required = true },
    { name = "ts",             type = "datetime", required = true },
]

[events."clock.unsynced"]
version = 1
description = "clock-watcher detected NTP drift > 1s."
fields = [
    { name = "drift_ms", type = "u64",      required = true },
    { name = "ts",       type = "datetime", required = true },
]

[events."harness.version-changed"]
version = 1
description = "harness-version-watcher detected drift between installed binary and lockfile."
fields = [
    { name = "harness",     type = "string",   required = true },
    { name = "expected",    type = "string",   required = true },
    { name = "installed",   type = "string",   required = true },
    { name = "detected_at", type = "datetime", required = true },
]


# ─── Setup / meta events ───────────────────────────────────────────────

[events."setup.completed"]
version = 1
description = "jam setup completed successfully — written to NATS KV setup-result bucket too (§11.4)."
fields = [
    { name = "checks_passed", type = "u32",      required = true },
    { name = "checks_total",  type = "u32",      required = true },
    { name = "ts",            type = "datetime", required = true },
]
