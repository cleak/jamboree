]

[events."pr.ci.status-changed"]
version = 1
description = "CI status flipped on a PR (running -> success/failure/cancelled)."
fields = [
    { name = "pr_ref",     type = "string",   required = true },
    { name = "task_id",    type = "string",   required = true },
    { name = "ci_status",  type = "string",   required = true },  # "running" | "success" | "failure" | "cancelled"
    { name = "changed_at", type = "datetime", required = true },
]

[events."pr.merged"]
version = 1
description = "PR merged via GitHub UI (the only merge path — see principle-no-auto-merge)."
fields = [
    { name = "pr_ref",      type = "string",   required = true },
    { name = "task_id",     type = "string",   required = true },
