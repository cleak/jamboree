# events.toml — single source of truth for event shapes (§4.4.3, dec-events-toml-manifest).
#
# Per `principle-journal-is-sacred-no-compaction`:
#   Old event types stay forever; new code emits new types; both readable.
#
# Rules:
#   - Additive (new optional field): bump per-event `version`. Old consumers
#     ignore unknown fields. Serde `default` handles missing fields when
#     reading old events with new code.
#   - Breaking (removing field, changing semantics): introduce a new event
#     type (e.g. `picker.spawned.v2`). Old type stays in journal forever;
#     new code emits new type. Reconciler reads both.
#
# Type vocabulary:
#   string, u32, u64, f64, bool, datetime, trace_id (ULID),
#   path (PathBuf-equivalent string), duration_ms (u64).
#
# Codegen (tools/events-codegen.py — pending) produces:
#   - crates/jam-events/src/generated/types.rs       (Rust structs + serde)
#   - crates/jam-events/src/generated/schemas/*.json (JSON Schema)
#   - maestro/src/jam_maestro/events/_generated.py   (Pydantic models)

schema_version = 1


# ─── Picker lifecycle ──────────────────────────────────────────────────

[events."picker.spawned"]
version = 2
description = "Emitted by jam-svc-session after a Picker process is launched (§24.3 step 10)."
fields = [
    { name = "task_id",          type = "string",   required = true  },
    { name = "harness",          type = "string",   required = true  },
    { name = "session_id",       type = "string",   required = true  },
    { name = "worktree_path",    type = "path",     required = true  },
    { name = "spawned_at",       type = "datetime", required = true  },
    { name = "picker_pid",       type = "u32",      required = false },
    { name = "picker_trace_id",  type = "trace_id", required = true  },
    { name = "maestro_trace_id", type = "trace_id", required = true  },
    { name = "sandbox_backend",  type = "string",   required = true  },
    { name = "sandbox_profile",  type = "string",   required = true  },
    { name = "task_class",       type = "string",   required = true  },
    # v2: codex conversation UUID captured from the spawned rollout file.
    # Optional because (a) older spawns don't have it, and (b) other harnesses
    # may not expose a conversation id. Required for codex resume.
    { name = "codex_conversation_id", type = "string", required = false },
    # v2: when this spawn resumes an earlier session, parent_session_id points
    # at the original `session_id`. Used by the coordinator to chain
    # continuation attempts.
    { name = "parent_session_id",     type = "string", required = false },
]

[events."picker.first-output"]
version = 1
description = "First non-empty stdout/stderr line from a Picker — used by task-lifecycle-handler to mark first-progress."
fields = [
    { name = "session_id", type = "string",   required = true },
    { name = "task_id",    type = "string",   required = true },
    { name = "ts",         type = "datetime", required = true },
]

[events."picker.exited"]
version = 1
description = "Picker process exited normally (zero or non-zero, but not killed)."
fields = [
    { name = "session_id", type = "string",   required = true },
    { name = "task_id",    type = "string",   required = true },
    { name = "exit_code",  type = "u32",      required = true },
    { name = "exited_at",  type = "datetime", required = true },
    { name = "duration_ms", type = "duration_ms", required = true },
]

[events."picker.killed"]
version = 1
description = "Picker terminated via full-stop (§5.7) — SIGTERM 2s grace then SIGKILL."
fields = [
    { name = "session_id",    type = "string",   required = true  },
    { name = "task_id",       type = "string",   required = true  },
    { name = "reason",        type = "string",   required = true  },
    { name = "killed_at",     type = "datetime", required = true  },
    { name = "diff_snapshot", type = "string",   required = false },
    { name = "from",          type = "string",   required = true  },  # "human:<user-id>" | "maestro:<session-id>" | "supervisor"
]

[events."picker.errored"]
version = 1
description = "Picker raised an internal error before exit — Maestro wakes on this."
fields = [
    { name = "session_id", type = "string",   required = true },
    { name = "task_id",    type = "string",   required = true },
    { name = "error_kind", type = "string",   required = true },
    { name = "detail",     type = "string",   required = true },
    { name = "ts",         type = "datetime", required = true },
]

[events."picker.idle"]
version = 1
description = "Picker reached prompt-waiting state with no queued message — Maestro may decide to wake."
fields = [
    { name = "session_id", type = "string",   required = true },
    { name = "task_id",    type = "string",   required = true },
    { name = "ts",         type = "datetime", required = true },
]

[events."picker.stalled"]
version = 1
description = "stall-detector escalation (§4.4.6): token-idle, tool-loop, or no-progress."
fields = [
    { name = "session_id",    type = "string",   required = true },
    { name = "task_id",       type = "string",   required = true },
    { name = "stall_kind",    type = "string",   required = true },  # "token-idle" | "tool-loop" | "no-progress"
    { name = "stall_secs",    type = "u32",      required = true },
    { name = "detected_at",   type = "datetime", required = true },
]

[events."picker.continuation-needed"]
version = 1
description = "Post-picker coordinator determined the worktree is not ready to ship as-is (or a downstream signal like CodeRabbit / CI failure arrived). A continuation-spawner resumes the same picker session with the supplied prompt. See dec-post-picker-coordination."
fields = [
    { name = "task_id",       type = "string",   required = true  },
    # Original picker session id (jam-svc-session ULID, e.g. codex-cli:01K...).
    # The continuation spawner uses this to look up codex_conversation_id from
    # the most recent picker.spawned event.
    { name = "session_id",    type = "string",   required = true  },
    { name = "worktree_path", type = "path",     required = true  },
    # Why the continuation is needed:
    #   "dirty-tree"           — commits ahead but uncommitted changes left over
    #   "no-commits"           — picker exited 0 but produced no commits
    #   "missing-pr-metadata"  — .jam/pr-title.txt or .jam/pr-body.md missing
    #   "picker-failed"        — picker exited non-zero
    #   "ci-failed"            — CI reported failure on the opened PR
    #   "review-received"      — reviewer (e.g. CodeRabbit) left comments to address
    { name = "reason",        type = "string",   required = true  },
    { name = "detail",        type = "string",   required = true  },
    # Prompt drafted by the coordinator for the resumed session. The
    # continuation spawner passes this verbatim as `codex resume`'s prompt arg.
    { name = "prompt",        type = "string",   required = true  },
    # Number of continuations attempted for this task already (zero on first).
    # Loop-guard for the coordinator: above a cap, escalate via notify-human.
    { name = "attempt",       type = "u32",      required = true  },
    { name = "requested_at",  type = "datetime", required = true  },
]


# ─── Task lifecycle (high-level, derived from Picker events) ──────────

[events."task.requested"]
