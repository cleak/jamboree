    { name = "task_id",      type = "string", required = true },
    { name = "description",  type = "string", required = true },
    { name = "project",      type = "string", required = true },
    { name = "task_class",   type = "string", required = true },
    { name = "priority",     type = "string", required = true },  # "low" | "normal" | "high"
    { name = "requested_by", type = "string", required = true },  # "human:<user-id>"
]

[events."task.abandoned"]
version = 1
description = "Task explicitly abandoned (purge-session called or all retries exhausted)."
fields = [
    { name = "task_id",      type = "string",   required = true },
    { name = "reason",       type = "string",   required = true },
    { name = "abandoned_at", type = "datetime", required = true },
]

[events."task.failed"]
version = 1
description = "Task failed before or outside normal Picker exit handling."
fields = [
    { name = "task_id",           type = "string",   required = true },
    { name = "reason",            type = "string",   required = true },
    { name = "detail",            type = "string",   required = true },
    { name = "failed_at",         type = "datetime", required = true },
    { name = "source_event_type", type = "string",   required = true },
]

[events."tempyr.task-updated"]
version = 1
description = "task-lifecycle-handler updated the canonical Tempyr task node for a lifecycle transition."
fields = [
    { name = "task_id",           type = "string",   required = true },
    { name = "status",            type = "string",   required = true },
    { name = "task_path",         type = "path",     required = true },
    { name = "source_event_type", type = "string",   required = true },
    { name = "updated_at",        type = "datetime", required = true },
]


