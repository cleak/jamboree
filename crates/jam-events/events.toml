    { name = "task_id",      type = "string",   required = true },
    { name = "reviewer",     type = "string",   required = true },
    { name = "artifact_count", type = "u32",    required = true },
    { name = "received_at",  type = "datetime", required = true },
]

[events."pr.status-changed"]
version = 1
description = "pr-status-poller observed PR state or draft status change."
fields = [
    { name = "pr_ref",     type = "string",   required = true },
    { name = "task_id",    type = "string",   required = true },
    { name = "state",      type = "string",   required = true },
